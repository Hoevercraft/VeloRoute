<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeloRoute</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0c1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VeloRoute">

<style>
body{
    margin:0;
    background:#0c1220;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    text-align:center;
}
.card{
    max-width:500px;
    padding:30px;
}
button{
    background:#22c55e;
    border:none;
    color:black;
    padding:16px 24px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="card">
<h1>🚴 VeloRoute</h1>
<p>Deine iPhone Fahrrad-App ist bereit.</p>

<button onclick="openPlanner()">App starten</button>
</div>

<script>
function openPlanner(){
    alert("Hier kommt deine vollständige Routen-App hinein.");
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
